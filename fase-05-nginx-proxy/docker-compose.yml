services:
  proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - site
      - api
    networks:
      - minha-rede

  site:
    build: ../fase-03-compose
    container_name: meu-site
    networks:
      - minha-rede

  api:
    image: hashicorp/http-echo
    container_name: minha-api
    command: ["-text=Ola, sou a API por tras do proxy!"]
    networks:
      - minha-rede

networks:
  minha-rede:
    driver: bridge
